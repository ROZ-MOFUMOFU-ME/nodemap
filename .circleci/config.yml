version: 2.1
orbs:
  node: circleci/node@5.2
jobs:
  test:
    parameters:
      node-version:
        type: string
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - node/install:
          node-version: << parameters.node-version >>
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Type-check
          command: npm run typecheck
      - run:
          name: Test
          command: npm test
      - run:
          name: Build
          command: npm run build
workflows:
  build_and_test:
    jobs:
      - test:
          matrix:
            parameters:
              node-version: ['20.20', '22.22', '24.16']
